<!DOCTYPE html>
<html>
<head>
  <title>Pending Verification - Fuel Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      display: grid;
      place-items: center;
      padding: 18px;
      background: #f5f7f8;
      color: #14213d;
      font-family: Arial, sans-serif;
    }
    .card {
      width: min(100%, 460px);
      padding: 26px;
      border: 1px solid #bbf7d0;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      animation: riseIn 0.28s ease both;
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .mark {
      width: 52px;
      height: 52px;
      display: grid;
      place-items: center;
      margin-bottom: 16px;
      border-radius: 14px;
      background: #dcfce7;
      color: #166534;
      font-size: 26px;
    }
    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 30px;
      letter-spacing: -0.03em;
    }
    p {
      margin: 10px 0 0;
      color: #64748b;
      line-height: 1.5;
    }
    .actions {
      display: grid;
      gap: 10px;
      margin-top: 22px;
    }
    a {
      min-height: 48px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 12px;
      background: #0f766e;
      color: #ffffff;
      font-weight: 900;
      text-decoration: none;
      transition: background 0.2s ease, transform 0.2s ease;
    }
    a:hover {
      background: #115e59;
      transform: translateY(-1px);
    }
    .secondary {
      border: 1px solid #99f6e4;
      background: #ffffff;
      color: #0f766e;
    }
    .secondary:hover {
      background: #ecfdf5;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="mark">✓</div>
    <h1>Pending Verification</h1>
    <p>Your station account has been submitted. You can sign in to check your dashboard status while approval is pending.</p>
    <div class="actions">
      <a href="/partner/login">Sign In</a>
      <a class="secondary" href="/index.html">Back to public fuel search</a>
    </div>
  </main>
</body>
</html>
