<!DOCTYPE html>
<html>
<head>
  <title>Station Owner Login - Fuel Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { box-sizing: border-box; }
    body {
      min-height: 100vh;
      margin: 0;
      background: #f5f7f8;
      color: #14213d;
      font-family: Arial, sans-serif;
    }
    .shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 18px;
    }
    .card {
      width: min(100%, 440px);
      padding: 26px;
      border: 1px solid #e5e7eb;
      border-radius: 18px;
      background: #ffffff;
      box-shadow: 0 18px 50px rgba(15, 23, 42, 0.12);
      animation: riseIn 0.28s ease both;
    }
    @keyframes riseIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 22px;
    }
    .mark {
      width: 44px;
      height: 44px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      background: #0f766e;
      color: #ffffff;
      font-size: 22px;
    }
    h1 {
      margin: 0;
      color: #0f172a;
      font-size: 28px;
      letter-spacing: -0.03em;
    }
    .subtitle {
      margin: 7px 0 22px;
      color: #64748b;
      line-height: 1.5;
    }
    label {
      display: block;
      margin: 14px 0 6px;
      color: #334155;
      font-size: 13px;
      font-weight: 900;
    }
    input {
      width: 100%;
      min-height: 48px;
      padding: 12px 13px;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
      background: #f8fafc;
      font-size: 15px;
    }
    input:focus {
      border-color: #0f766e;
      background: #ffffff;
      outline: none;
      box-shadow: 0 0 0 4px rgba(15, 118, 110, 0.12);
    }
    button, .link-btn {
      width: 100%;
      min-height: 48px;
      margin-top: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 12px;
      background: #0f766e;
      color: #ffffff;
      cursor: pointer;
      font-weight: 900;
      text-decoration: none;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    button:hover, .link-btn:hover {
      background: #115e59;
      transform: translateY(-1px);
    }
    .secondary {
      background: #ffffff;
      color: #0f766e;
      border: 1px solid #99f6e4;
    }
    .secondary:hover { background: #ecfdf5; }
    .helper {
      margin-top: 16px;
      color: #64748b;
      font-size: 14px;
      text-align: center;
    }
    .helper a { color: #0f766e; font-weight: 900; text-decoration: none; }
    #message {
      min-height: 20px;
      margin: 14px 0 0;
      color: #64748b;
      font-size: 14px;
      text-align: center;
    }
    #message.error { color: #991b1b; }
    #message.success { color: #166534; }
  </style>
</head>
<body>
  <main class="shell">
    <section class="card">
      <div class="brand">
        <div class="mark">⛽</div>
        <div>
          <h1>Station Owner Portal</h1>
          <p class="subtitle">Manage your station prices, availability, hours, and profile.</p>
        </div>
      </div>

      <form id="loginForm">
        <label for="identifier">Email Address or Phone Number</label>
        <input id="identifier" type="text" autocomplete="username" required>

        <label for="password">Password</label>
        <input id="password" type="password" autocomplete="current-password" required>

        <button type="submit" id="loginBtn">Sign In</button>
      </form>

      <a class="link-btn secondary" href="/partner/signup">Create Account</a>
      <p class="helper">Need a station account? <a href="/partner/signup">Sign Up</a></p>
      <p class="helper"><a href="/index.html">Back to public fuel search</a></p>
      <p id="message"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById("loginForm");
    const message = document.getElementById("message");
    const loginBtn = document.getElementById("loginBtn");
    const partnerAuth = {
      tokenKey: "partnerToken",
      loginPath: "/partner/login",
      dashboardPath: "/partner/dashboard",
      signupPath: "/partner/signup",
      getToken() {
        return localStorage.getItem(this.tokenKey);
      },
      setSession(token) {
        localStorage.setItem(this.tokenKey, token);
      },
      clearSession() {
        localStorage.removeItem(this.tokenKey);
      }
    };

    function setMessage(text, type = "") {
      message.className = type;
      message.textContent = text;
    }

    if (partnerAuth.getToken()) {
      fetch("/partner/me", {
        headers: { "Authorization": "Bearer " + partnerAuth.getToken() }
      })
      .then(res => {
        if (!res.ok) throw new Error("Session expired");
        window.location.href = partnerAuth.dashboardPath;
      })
      .catch(() => partnerAuth.clearSession());
    }

    form.addEventListener("submit", event => {
      event.preventDefault();
      setMessage("Signing in...");
      loginBtn.disabled = true;

      fetch("/partner/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          identifier: document.getElementById("identifier").value.trim(),
          password: document.getElementById("password").value
        })
      })
      .then(async res => {
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || "Login failed");
        return data;
      })
      .then(data => {
        partnerAuth.setSession(data.token);
        setMessage("Signed in. Opening dashboard...", "success");
        window.location.href = partnerAuth.dashboardPath;
      })
      .catch(err => {
        partnerAuth.clearSession();
        setMessage(err.message, "error");
      })
      .finally(() => {
        loginBtn.disabled = false;
      });
    });
  </script>
</body>
</html>
